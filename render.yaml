databases:
  - name: skyops-db
    databaseName: skyops
    user: skyops
    plan: free

# Production: deploy from `master` (Render watches this branch).
services:
  - type: web
    name: skyops-mission-control-api
    branch: master
    runtime: node
    plan: free
    rootDir: .
    # Free tier ~512MB: scoped install + capped Node heap. Migrations run via TypeORM migrationsRun in Nest (see typeorm.config.ts).
    buildCommand: corepack enable && export NODE_OPTIONS=--max-old-space-size=460 && pnpm install --frozen-lockfile --filter @skyops/api... && pnpm --filter @skyops/api build
    startCommand: pnpm --filter @skyops/api start:prod
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skyops-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      # Browser origin of the static site (required: unset CORS falls back to localhost-only).
      - key: CORS_ORIGIN
        value: https://skyops-mission-control-web.onrender.com
  # Static sites: do not set plan: free here — Render rejects it for runtime: static (use default / dashboard if needed).
  - type: web
    name: skyops-mission-control-web
    branch: master
    runtime: static
    rootDir: .
    # Fail fast if the API base URL was not injected (otherwise the SPA calls /api on the static host → Network Error).
    buildCommand: corepack enable && export NODE_OPTIONS=--max-old-space-size=460 && if [ -z "$VITE_API_BASE_URL" ]; then echo 'ERROR: VITE_API_BASE_URL must be set to https://<your-api-service>.onrender.com/api'; exit 1; fi && pnpm install --frozen-lockfile --filter @skyops/web... && pnpm --filter @skyops/web build
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_BASE_URL
        value: https://skyops-mission-control-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
