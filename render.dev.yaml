# Staging / preview: deploy from `dev` (separate DB and URLs from production).
# In Render: create a second Blueprint and point it at this file, or import manually.
databases:
  - name: skyops-db-dev
    databaseName: skyops_dev
    user: skyops
    plan: free

services:
  - type: web
    name: skyops-mission-control-api-dev
    branch: dev
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @skyops/api build
    startCommand: pnpm --filter @skyops/api migration:run && pnpm --filter @skyops/api start:prod
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skyops-db-dev
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
  - type: web
    name: skyops-mission-control-web-dev
    branch: dev
    runtime: static
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @skyops/web build
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: NODE_VERSION
        value: 22
      # Must match your dev API service URL after first deploy (Render dashboard shows the hostname).
      - key: VITE_API_BASE_URL
        value: https://skyops-mission-control-api-dev.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
