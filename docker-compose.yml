services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skyops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d skyops']
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3000
      JWT_SECRET: local-docker-jwt-secret-change-in-production-32
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: skyops
      # Migrations run on every API container start. Demo seed runs only when the users table is empty
      # (fresh volume). Set DOCKER_FORCE_SEED=1 to re-run seed anyway. Set DOCKER_SKIP_SEED=1 to never seed.
      # DOCKER_FORCE_SEED: "1"
      # DOCKER_SKIP_SEED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  postgres_data:
